version: "3.9"

# ============================================================
# HL7 & EHR → FHIR Converter  —  docker-compose.yml
# Innova Solutions  |  2026 AI Hackathon  |  CS06
# ============================================================
# Setup:
#   1. cp .env.example .env   (then fill in your API keys)
#   2. docker compose up --build
#   3. Open http://localhost:8000
# ============================================================

services:
  hl7-fhir-converter:
    build:
      context: .
      dockerfile: Dockerfile
    image: hl7-fhir-converter:2.0.0
    container_name: hl7-fhir-converter
    restart: unless-stopped

    ports:
      - "${APP_PORT:-8000}:8000"

    env_file:
      - .env

    environment:
      # AI provider keys (override from .env)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # App tuning
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - WORKERS=${WORKERS:-2}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

    volumes:
      - converter_data:/app/data

volumes:
  converter_data:
